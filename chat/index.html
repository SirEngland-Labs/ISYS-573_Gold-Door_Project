<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Door Restaurant - Reservation Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #d4a574 0%, #b8860b 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            margin-top: 4px;
            opacity: 0.95;
        }

        /* Chat messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #e8e8e8;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d4a574;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #b8860b;
        }

        /* Message styles */
        .message {
            display: flex;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.agent {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #d4a574 0%, #b8860b 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-content {
            background: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-content strong {
            font-weight: 600;
        }

        /* Input area */
        .input-area {
            background: white;
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-container {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d0d0d0;
            border-radius: 24px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #d4a574;
        }

        button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #d4a574 0%, #b8860b 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e8e8e8;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .message-content {
                max-width: 85%;
                font-size: 14px;
            }

            input[type="text"] {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }

        /* Welcome message styling */
        .welcome-message {
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Gold Door Restaurant</h1>
            <p>Chat with Goldie, our reservation assistant</p>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="input-area">
            <div class="input-container">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Ask Goldie about reservations, menu, or hours..."
                    autocomplete="off"
                >
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Generate a random session ID for this visitor
        function generateSessionId() {
            return 'web_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now();
        }

        const sessionId = generateSessionId();
        const messagesContainer = document.getElementById('chatMessages');
        const inputField = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // Add a message to the UI
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'agent'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Convert markdown bold to HTML bold
            const processedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            contentDiv.innerHTML = processedText;

            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);

            // Auto-scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            return messageDiv;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message agent';
            messageDiv.id = 'typingIndicator';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';

            messageDiv.appendChild(typingDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Strip <think> tags from response
        function stripThinkTags(text) {
            return text.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
        }

        // Send message to the agent
        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            // Disable input while sending
            inputField.disabled = true;
            sendButton.disabled = true;

            // Add user message to UI
            addMessage(message, true);
            inputField.value = '';

            // Show typing indicator
            showTypingIndicator();

            try {
                const response = await fetch('/api/message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        phone: sessionId,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                let agentResponse = data.response;

                // Strip think tags
                agentResponse = stripThinkTags(agentResponse);

                removeTypingIndicator();
                addMessage(agentResponse, false);
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage('Sorry, I encountered an error. Please try again.', false);
            } finally {
                inputField.disabled = false;
                sendButton.disabled = false;
                inputField.focus();
            }
        }

        // Send on Enter key
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send button click
        sendButton.addEventListener('click', sendMessage);

        // Initialize on page load
        window.addEventListener('load', () => {
            inputField.focus();
        });
    </script>
</body>
</html>
