version: "3.8"

services:
  agent:
    build: .
    container_name: restaurant-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./knowledge:/app/knowledge:ro
      - agent-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: restaurant-dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - agent-data:/app/data
    restart: unless-stopped
    depends_on:
      - agent

volumes:
  agent-data:
